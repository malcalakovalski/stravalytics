name: Update Dashboard

on:
  schedule:
    - cron: '0 10 * * *'  # Daily at 10am UTC (5-6am ET)
  push:
    branches: [main]
    paths:
      - 'dashboard.qmd'
      - '.github/workflows/dashboard.yml'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m ipykernel install --user --name stravalytics

      - uses: quarto-dev/quarto-actions/setup@v2

      # Strava tokens rotate on refresh. Cache persists them between runs;
      # the STRAVA_TOKENS_JSON secret bootstraps the very first run.
      - name: Restore Strava tokens
        uses: actions/cache/restore@v4
        with:
          path: strava_tokens.json
          key: strava-tokens-${{ github.run_id }}
          restore-keys: strava-tokens-

      - name: Bootstrap tokens (first run or expired cache)
        env:
          STRAVA_TOKENS: ${{ secrets.STRAVA_TOKENS_JSON }}
        run: '[ -f strava_tokens.json ] || echo "$STRAVA_TOKENS" > strava_tokens.json'

      - name: Export Strava data
        continue-on-error: true
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
        run: python strava_export.py

      - name: Save Strava tokens
        uses: actions/cache/save@v4
        with:
          path: strava_tokens.json
          key: strava-tokens-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Update Strava data [skip ci]"
          git push

      - name: Render dashboard
        run: quarto render dashboard.qmd

      - name: Prepare site
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
